<!DOCTYPE html>
<html>
<head>
    <title>RedBid</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>🔥 RedBid</header>

<div class="container">
    <a href="/create">➕ Добавить лот</a>

    {% for item in items %}
        <div class="card">
            <h3>{{ item.name }}</h3>
            <p>Цена: {{ item.price }} тг</p>
        </div>
    {% endfor %}
</div>

</body>
</html>
